# The name of the mod loader type to load - for regular FML @Mod mods it should be javafml
modLoader="javafml"

# A version range to match for said mod loader - for regular FML @Mod it will be the FML version.
loaderVersion="${loader_version_range}"

# The license for your mod.
license="${mod_license}"

# A URL to refer people to when problems occur with this mod
issueTrackerURL="https://github.com/MinecraftModDevelopmentMods/Extra-Golems/issues"

# A list of mods - how many allowed here is determined by the individual mod loader
[[mods]]
    # The modid of the mod
    modId="${mod_id}"
    
    # The version number of the mod
    version="${mod_version}"
    
    # A display name for the mod
    displayName="${mod_name}"
    
    # A file name (in the root of the mod JAR) containing a logo for display
    logoFile="golem_logo.png"
    
    # A text field displayed in the mod UI
    credits="TheGlitch76, jriwanek, AtelierAmber, and translators - Thanks!"
    
    # A text field displayed in the mod UI
    authors="${mod_authors}"
    
    # The description text for the mod (multi line!)
    description='''${mod_description}'''

# A dependency - use the . to indicate dependency for a specific modid.
[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="theoneprobe"
    type="optional"
    versionRange="[1.21_neo-12.0.0,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="jade"
    type="optional"
    versionRange="[15.0.0,)"
    ordering="NONE"
    side="CLIENT"

[[dependencies.${mod_id}]]
    modId="quark"
    type="optional"
    versionRange="[4.0-433,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="biomesoplenty"
    type="optional"
    versionRange="[1.21.1-21.0.0.0,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="thermal"
    type="optional"
    versionRange="[11.0.0,)"
    ordering="NONE"
    side="BOTH"
